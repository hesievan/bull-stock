<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A股牛市热度指数</title>
<script src="echarts.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080b12;--card:#0d1117;--card-hover:#111820;--border:#1b2230;--border-h:#2d3a4f;--tx1:#e6edf3;--tx2:#8b949e;--tx3:#484f58;--accent:#58a6ff;--red:#f85149;--yellow:#d29922;--green:#3fb950;--r:12px;--rs:8px;--sans:'Inter',-apple-system,sans-serif;--mono:'JetBrains Mono',monospace}
body{font-family:var(--sans);background:var(--bg);color:var(--tx1);min-height:100vh;line-height:1.5;-webkit-font-smoothing:antialiased}
.container{max-width:1280px;margin:0 auto;padding:0 28px}
.header{display:flex;align-items:center;justify-content:space-between;padding:20px 0;border-bottom:1px solid var(--border);margin-bottom:20px}
.header h1{font-size:18px;font-weight:700;color:var(--tx1);letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
.header .tag{font-size:11px;color:var(--accent);background:rgba(88,166,255,.08);padding:3px 10px;border-radius:20px;font-weight:600;letter-spacing:.5px}
.header-right{display:flex;align-items:center;gap:14px}
.header-time{font-family:var(--mono);font-size:11px;color:var(--tx3)}
.btn-refresh{width:32px;height:32px;border-radius:var(--rs);border:1px solid var(--border);background:var(--card);color:var(--tx2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s}
.btn-refresh:hover{background:var(--card-hover);border-color:var(--border-h)}
.tabs{display:flex;gap:2px;margin-bottom:24px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:4px}
.tab{padding:10px 20px;border-radius:var(--rs);font-size:13px;font-weight:500;color:var(--tx2);cursor:pointer;transition:all .2s;border:none;background:none}
.tab:hover{color:var(--tx1);background:rgba(255,255,255,.04)}
.tab.active{color:var(--tx1);background:rgba(255,255,255,.06);box-shadow:0 1px 3px rgba(0,0,0,.2)}
.status-bar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);margin-bottom:20px;font-size:12px;font-family:var(--mono)}
.status-dot{width:7px;height:7px;border-radius:50%}
.status-dot.ok{background:var(--green);box-shadow:0 0 6px var(--green)}
.status-steps{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto}
.step{padding:2px 8px;border-radius:4px;font-size:10px;font-family:var(--mono)}
.step.ok{background:rgba(63,185,80,.12);color:var(--green)}.step.fail{background:rgba(248,81,73,.12);color:var(--red)}.step.skip{color:var(--tx3)}
.score-hero{display:grid;grid-template-columns:auto 1fr;gap:48px;align-items:center;padding:24px 0 32px;border-bottom:1px solid var(--border)}
.gauge-wrap{width:280px;height:260px}
.score-big{font-size:72px;font-weight:900;letter-spacing:-3px;line-height:1;font-family:var(--mono);transition:color .3s}
.score-label{font-size:16px;font-weight:600;margin-top:6px}
.score-date{font-size:12px;color:var(--tx3);margin-top:4px;font-family:var(--mono)}
.score-delta{font-size:13px;margin-top:8px;padding:4px 12px;border-radius:20px;display:inline-block;font-weight:500}
.dim-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin:24px 0}
.dim-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px 14px;transition:border-color .2s}
.dim-card:hover{border-color:var(--border-h)}
.dim-card .label{font-size:11px;color:var(--tx3);margin-bottom:6px;font-weight:500;letter-spacing:.3px;text-transform:uppercase}
.dim-card .value{font-size:32px;font-weight:800;font-family:var(--mono);line-height:1.1}
.dim-card .bar{height:3px;background:var(--border);border-radius:2px;margin-top:10px;overflow:hidden}
.dim-card .bar-fill{height:100%;border-radius:2px;transition:width .6s ease-out}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:20px 0}
.dim-chart-grid{display:grid;grid-template-columns:1fr;gap:16px;margin:24px 0}
.chart-area{height:320px}
.chart-area-lg{height:380px}
.sector-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:16px 0}
.sector-box{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px}
.sector-box h3{font-size:12px;font-weight:600;color:var(--tx2);margin-bottom:14px;letter-spacing:.3px;text-transform:uppercase}
.sector-area{height:420px}
.summary-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.summary-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;text-align:center}
.summary-card .num{font-size:28px;font-weight:800;font-family:var(--mono)}
.summary-card .label{font-size:11px;color:var(--tx3);margin-top:4px}
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.table-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.table-head h3{font-size:13px;font-weight:600;color:var(--tx2)}
.table-scroll{max-height:520px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{text-align:left;padding:10px 14px;background:var(--bg);color:var(--tx3);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:1}
tbody td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:hover{background:rgba(255,255,255,.02)}
.detail-section{margin-bottom:24px}
.detail-section h3{font-size:13px;font-weight:600;color:var(--tx2);margin-bottom:12px;letter-spacing:.3px;text-transform:uppercase}
.ind-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.ind-item{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:14px}
.ind-item .name{font-size:11px;color:var(--tx3);margin-bottom:4px}
.ind-item .val{font-size:22px;font-weight:700;font-family:var(--mono)}
.ind-item .desc{font-size:10px;color:var(--tx3);margin-top:4px;line-height:1.4}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:100px 20px;color:var(--tx2)}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.disclaimer{padding:16px 20px;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);font-size:11px;color:var(--tx3);text-align:center;margin:24px 0}
@media(max-width:1024px){.dim-grid{grid-template-columns:repeat(3,1fr)}.chart-row,.sector-grid{grid-template-columns:1fr}.score-hero{grid-template-columns:1fr;text-align:center}.score-meta{text-align:center}.gauge-wrap{margin:0 auto}.header{flex-wrap:wrap;gap:12px}.header-right{width:100%;justify-content:flex-end}}
@media(max-width:768px){.dim-grid{grid-template-columns:repeat(2,1fr)}.summary-row{grid-template-columns:repeat(2,1fr)}.score-big{font-size:56px}.tabs{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch}.tab{padding:8px 14px;font-size:12px;white-space:nowrap}.container{padding:0 16px}.ind-grid{grid-template-columns:1fr}.table-scroll{max-height:400px}thead th,tbody td{padding:8px 10px;font-size:11px}.chart-area{height:240px}.chart-area-lg{height:300px}}
@media(max-width:480px){.dim-grid{grid-template-columns:1fr 1fr;gap:8px}.dim-card{padding:12px 10px}.dim-card .value{font-size:24px}.score-big{font-size:48px}.gauge-wrap{width:200px;height:200px}.header h1{font-size:15px}.summary-row{grid-template-columns:1fr 1fr;gap:8px}.summary-card{padding:12px}.summary-card .num{font-size:22px}}
</style>
</head>
<body>
<div id="loadingScreen" class="loading"><div class="spinner"></div><div style="font-size:13px;color:var(--tx2)">加载数据中...</div></div>
<div id="app" style="display:none"><div class="container">
<div class="header"><div class="header-brand"><h1>牛市热度指数</h1><span class="tag">LIVE</span></div><div class="header-right"><span class="header-time" id="lastUpdate"></span><button class="btn-refresh" id="refreshBtn" onclick="App.refresh()" title="刷新">↻</button></div></div>
<div class="tabs"><div class="tab active" onclick="App.switchTab('overview',this)">概览</div><div class="tab" onclick="App.switchTab('detail',this)">指标拆解</div><div class="tab" onclick="App.switchTab('sectors',this)">板块热度</div><div class="tab" onclick="App.switchTab('history',this)">历史记录</div></div>
<div class="status-bar" id="statusBar" style="display:none"><span class="status-dot" id="statusDot"></span><span id="statusText"></span><div class="status-steps" id="statusSteps"></div></div>
<div id="tab-overview" class="tab-content">
<div class="score-hero"><div class="gauge-wrap"><div id="gaugeChart" style="width:100%;height:100%"></div></div><div class="score-meta"><div id="scoreValue" class="score-big">--</div><div id="scoreLabel" class="score-label">加载中</div><div id="scoreDate" class="score-date"></div><div id="dailyChange" class="score-delta"></div></div></div>
<div id="dimCards" class="dim-grid"></div>
<div class="chart-box" style="margin:20px 0"><h3>综合热度走势</h3><div id="historyChart" class="chart-area-lg"></div></div>
<div class="chart-row"><div class="chart-box"><h3>五维雷达</h3><div id="radarChart" class="chart-area-lg"></div></div></div>
<div class="dim-chart-grid">
<div class="chart-box"><h3>估值走势</h3><div id="dimChartValuation" class="chart-area"></div></div>
<div class="chart-box"><h3>资金走势</h3><div id="dimChartFund" class="chart-area"></div></div>
<div class="chart-box"><h3>情绪走势</h3><div id="dimChartSentiment" class="chart-area"></div></div>
<div class="chart-box"><h3>技术走势</h3><div id="dimChartTechnical" class="chart-area"></div></div>
<div class="chart-box"><h3>结构走势</h3><div id="dimChartStructure" class="chart-area"></div></div>
<div class="chart-box"><h3>宏观走势</h3><div id="dimChartMacro" class="chart-area"></div></div>
</div>
</div>
<div id="tab-detail" class="tab-content" style="display:none"><div id="detailContent"></div></div>
<div id="tab-sectors" class="tab-content" style="display:none"><div id="sectorSummary" class="summary-row"></div><div class="sector-grid"><div class="sector-box"><h3>热度矩阵</h3><div id="treemap" class="sector-area"></div></div><div class="sector-box"><h3>行业排名</h3><div id="sectorBar" class="sector-area"></div></div></div><div class="table-wrap" style="margin-top:16px"><div class="table-head"><h3>行业明细</h3><span id="sectorCount" style="font-size:11px;color:var(--tx3)"></span></div><div class="table-scroll"><table><thead><tr><th>#</th><th>行业</th><th>热度</th><th>综合</th><th>估值</th><th>情绪</th><th>技术</th><th>平均涨跌</th><th>上涨比</th><th>领涨股</th></tr></thead><tbody id="sectorTableBody"></tbody></table></div></div></div>
<div id="tab-history" class="tab-content" style="display:none"><div class="table-wrap"><div class="table-head"><h3>近期记录</h3></div><div class="table-scroll" style="max-height:600px"><table><thead><tr><th>日期</th><th>综合</th><th>估值</th><th>资金</th><th>情绪</th><th>技术</th><th>结构</th><th>状态</th></tr></thead><tbody id="historyTableBody"></tbody></table></div></div>
<div class="disclaimer">本指数仅反映市场历史统计规律，不构成投资建议。历史规律不代表未来表现。</div>
</div></div>
<script>
const App=(()=>{'use strict';let state={index:null,detail:null,history:[],sectors:[],runStatus:null,tab:'overview',charts:{}};
function ts(){return'?t='+Date.now()}
function lvl(s){return s==null?'unknown':s>=70?'red':s>=40?'yellow':'green'}
function lvlCN(s){return{red:'红色预警',yellow:'黄色警惕',green:'绿色安全'}[lvl(s)]||'未知'}
function clr(s){return{red:'#f85149',yellow:'#d29922',green:'#3fb950'}[lvl(s)]||'#6e7681'}
const names={valuation:'估值',macro:'宏观',fund:'资金',sentiment:'情绪',technical:'技术',structure:'结构'};
async function fetchJSON(url){try{const r=await fetch(url+'?t='+Date.now());if(!r.ok)throw 0;return await r.json()}catch(e){return null}}
async function loadData(){const[i,d,h,s,rs]=await Promise.all([fetchJSON('data/index.json'),fetchJSON('data/detail.json'),fetchJSON('data/history.json'),fetchJSON('data/sectors.json'),fetchJSON('data/run_status.json')]);state.index=i;state.detail=d;state.history=h||[];state.sectors=s||[];state.runStatus=rs;return{ok:!!i}}
async function refresh(){document.getElementById('refreshBtn').disabled=true;try{const r=await loadData();if(!r.ok){return}showApp();renderTab(state.tab)}finally{document.getElementById('refreshBtn').disabled=false}}
function switchTab(t,el){state.tab=t;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));if(el)el.classList.add('active');document.querySelectorAll('.tab-content').forEach(x=>x.style.display='none');const e=document.getElementById('tab-'+t);if(e)e.style.display='';renderTab(t);setTimeout(()=>Object.values(state.charts).forEach(c=>{try{c.resize()}catch(e){}}),50)}
function renderTab(t){if(t==='overview')renderOverview();else if(t==='detail')renderDetail();else if(t==='sectors')renderSectors();else if(t==='history')renderHistory()}
function renderOverview(){const d=state.index;if(!d)return;const s=d.composite_score,c=clr(s);document.getElementById('scoreValue').textContent=s!=null?s.toFixed(1):'—';document.getElementById('scoreValue').style.color=c;document.getElementById('scoreLabel').textContent=lvlCN(s);document.getElementById('scoreDate').textContent=d.trade_date||'';const h=state.history||[],prev=h.length>=2?h[h.length-2]:null;if(prev&&s!=null){const diff=s-(prev.composite_score||0);const sign=diff>=0?'+':'';const el=document.getElementById('dailyChange');el.textContent='较昨日 '+sign+diff.toFixed(1);el.style.color=diff>=0?'#f85149':'#3fb950';el.style.background=diff>=0?'rgba(248,81,73,.08)':'rgba(63,185,80,.08)'}document.getElementById('lastUpdate').textContent=d.updated_at||'';renderStatusBar();const dimEl=document.getElementById('dimCards');dimEl.innerHTML='';const dims=d.dimensions||{};Object.entries(dims).forEach(([k,v])=>{const sc=v.score;const l=lvl(sc);const c=clr(sc);dimEl.innerHTML+='<div class="dim-card"><div class="label">'+(names[k]||k)+'</div><div class="value" style="color:'+c+'">'+(sc!=null?sc.toFixed(1):'—')+'</div><div class="bar"><div class="bar-fill" style="width:'+(sc||0)+'%;background:'+c+'"></div></div></div>'});renderGauge(s,c);renderHistoryChart();renderRadar();renderDimCharts()}
function renderStatusBar(){const rs=state.runStatus;if(!rs||!rs.steps){document.getElementById('statusBar').style.display='none';return}document.getElementById('statusBar').style.display='';const n=rs.n_failed||0;document.getElementById('statusDot').className='status-dot '+(n===0?'ok':n>2?'err':'warn');document.getElementById('statusText').textContent='上次运行: '+(rs.generated_at||'—')+(n===0?' 全部正常':' '+n+'个异常');const el=document.getElementById('statusSteps');el.innerHTML='';Object.entries(rs.steps).forEach(([name,info])=>{el.innerHTML+='<span class="step '+(info.status==='OK'?'ok':info.status==='FAILED'?'fail':'skip')+'">'+name+'</span>'})}
function renderGauge(s,c){if(typeof echarts==='undefined')return;let ch=state.charts.gauge;if(!ch){const el=document.getElementById('gaugeChart');if(!el)return;ch=echarts.init(el);state.charts.gauge=ch}ch.setOption({series:[{type:'gauge',startAngle:220,endAngle:-40,min:0,max:100,splitNumber:10,radius:'90%',center:['50%','65%'],axisLine:{lineStyle:{width:16,color:[[0.35,'#1a472a'],[0.7,'#5c4b00'],[1,'#5c1a1a']]}},splitLine:{length:10,lineStyle:{color:'#21262d',width:2}},axisTick:{show:false},axisLabel:{color:'#6e7681',fontSize:9,distance:-30},pointer:{icon:'path://M12.8 0.7l12 40.1H0.7L12.8 0.7z',length:'55%',width:5,offsetCenter:[0,'-8%'],itemStyle:{color:c}},detail:{valueAnimation:true,formatter:s!=null?'{value}':'—',color:c,fontSize:32,fontWeight:700,offsetCenter:[0,'50%']},title:{offsetCenter:[0,'80%'],color:'#6e7681',fontSize:11},data:[{value:s!=null?s:0,name:s!=null?lvlCN(s):'暂无'}]}]})}
function renderHistoryChart(){if(typeof echarts==='undefined')return;let ch=state.charts.history;if(!ch){const el=document.getElementById('historyChart');if(!el)return;ch=echarts.init(el);state.charts.history=ch}const h=state.history||[];const dates=h.map(d=>d.trade_date);const scores=h.map(d=>d.composite_score);const total=dates.length;const maxLabels=Math.floor(total/6);function ma(arr,n){const r=[];for(let i=0;i<arr.length;i++){if(i<n-1||arr[i]===null){r.push(null);continue}let s=0,c=0;for(let j=i-n+1;j<=i;j++){if(arr[j]!==null){s+=arr[j];c++}}r.push(c?Math.round(s/c*10)/10:null)}return r}const ma5=ma(scores,5),ma10=ma(scores,10),ma20=ma(scores,20);ch.setOption({tooltip:{trigger:'axis',formatter:p=>{let s=p[0].name;p.forEach(t=>{if(t.value!=null)s+='<br/>'+t.marker+t.seriesName+': <b>'+t.value.toFixed(1)+'</b>'});return s}},grid:{top:24,bottom:30,left:40,right:15},legend:{data:['热度','MA5','MA10','MA20'],top:2,right:10,textStyle:{color:'#8b949e',fontSize:10},itemWidth:12,itemHeight:8},dataZoom:[{type:'inside',start:0,end:100}],xAxis:{type:'category',data:dates,axisLabel:{color:'#6e7681',fontSize:10,interval:maxLabels>0?maxLabels:0,rotate:total>500?30:0},axisLine:{lineStyle:{color:'#21262d'}}},yAxis:{type:'value',min:0,max:100,splitLine:{lineStyle:{color:'#161b22'}},axisLabel:{color:'#6e7681',fontSize:10}},series:[{name:'热度',type:'line',data:scores,smooth:true,symbol:'none',sampling:'lttb',large:true,lineStyle:{color:'#58a6ff',width:2},areaStyle:{color:{type:'linear',x:0,y:0,x2:0,y2:1,colorStops:[{offset:0,color:'rgba(88,166,255,.2)'},{offset:1,color:'rgba(88,166,255,0)'}]}},markLine:{silent:true,data:[{yAxis:65,lineStyle:{color:'#f85149',type:'dashed',width:1},label:{color:'#f85149',fontSize:10,formatter:'红区 65'}},{yAxis:40,lineStyle:{color:'#d29922',type:'dashed',width:1},label:{color:'#d29922',fontSize:10,formatter:'黄区 40'}}]}},{name:'MA5',type:'line',data:ma5,symbol:'none',lineStyle:{color:'#3fb950',width:1.5}},{name:'MA10',type:'line',data:ma10,symbol:'none',lineStyle:{color:'#d29922',width:1.5}},{name:'MA20',type:'line',data:ma20,symbol:'none',lineStyle:{color:'#f85149',width:1.5}}]})}
function renderRadar(){if(typeof echarts==='undefined')return;let ch=state.charts.radar;if(!ch){const el=document.getElementById('radarChart');if(!el)return;ch=echarts.init(el);state.charts.radar=ch}const ds=state.index.dimensions||{};const keys=Object.keys({valuation:1,macro:1,fund:1,sentiment:1,technical:1,structure:1});ch.setOption({tooltip:{},radar:{indicator:keys.map(k=>({name:names[k]||k,max:100})),shape:'polygon',splitNumber:4,axisName:{color:'#8b949e',fontSize:11},splitLine:{lineStyle:{color:'#21262d'}},splitArea:{areaStyle:{color:['rgba(22,27,34,.5)','rgba(33,38,45,.5)']}},axisLine:{lineStyle:{color:'#21262d'}}},series:[{type:'radar',data:[{value:keys.map(k=>ds[k]&&ds[k].score!=null?+ds[k].score.toFixed(1):0),name:'热度',areaStyle:{color:'rgba(88,166,255,.15)'},lineStyle:{color:'#58a6ff',width:2},symbol:'circle',symbolSize:5,itemStyle:{color:'#58a6ff'}}]}]})}
const dimColors={valuation:'#58a6ff',fund:'#3fb950',sentiment:'#d29922',technical:'#f85149',structure:'#bc8cff',macro:'#79c0ff'};
const dimKeys=['valuation','fund','sentiment','technical','structure','macro'];
const dimChartIds={valuation:'dimChartValuation',fund:'dimChartFund',sentiment:'dimChartSentiment',technical:'dimChartTechnical',structure:'dimChartStructure',macro:'dimChartMacro'};
function renderDimCharts(){if(typeof echarts==='undefined')return;const h=state.history||[];if(!h.length)return;dimKeys.forEach(key=>{const el=document.getElementById(dimChartIds[key]);if(!el)return;let ch=state.charts['dim_'+key];if(!ch){ch=echarts.init(el);state.charts['dim_'+key]=ch}const raw=h.map(d=>{const dim=d.dimensions&&d.dimensions[key];if(dim==null)return null;if(typeof dim==='object')return dim.score!=null?dim.score:null;return dim});const hasData=raw.some(v=>v!==null);if(!hasData){el.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#6e7681;font-size:13px">暂无历史数据</div>';return}const dates=h.map(d=>d.trade_date);const total=dates.length;const maxLabels=Math.floor(total/6);function ma(arr,n){const r=[];for(let i=0;i<arr.length;i++){if(i<n-1||arr[i]===null){r.push(null);continue}let s=0,c=0;for(let j=i-n+1;j<=i;j++){if(arr[j]!==null){s+=arr[j];c++}}r.push(c?Math.round(s/c*10)/10:null)}return r}const ma5=ma(raw,5),ma10=ma(raw,10),ma20=ma(raw,20);ch.setOption({tooltip:{trigger:'axis',formatter:p=>{let s=p[0].name;p.forEach(t=>{if(t.value!=null)s+='<br/>'+t.marker+t.seriesName+': <b>'+t.value.toFixed(1)+'</b>'});return s}},grid:{top:24,bottom:24,left:36,right:10},legend:{data:['原始','MA5','MA10','MA20'],top:2,right:10,textStyle:{color:'#8b949e',fontSize:10},itemWidth:12,itemHeight:8},dataZoom:[{type:'inside',start:0,end:100}],xAxis:{type:'category',data:dates,axisLabel:{color:'#6e7681',fontSize:9,interval:maxLabels>0?maxLabels:0,rotate:total>500?30:0},axisLine:{lineStyle:{color:'#21262d'}}},yAxis:{type:'value',min:0,max:100,splitLine:{lineStyle:{color:'#161b22'}},axisLabel:{color:'#6e7681',fontSize:9}},series:[{name:'原始',type:'line',data:raw,smooth:true,symbol:'none',sampling:'lttb',large:true,lineStyle:{color:dimColors[key],width:1.5,opacity:.4},areaStyle:{color:{type:'linear',x:0,y:0,x2:0,y2:1,colorStops:[{offset:0,color:dimColors[key]+'20'},{offset:1,color:dimColors[key]+'00'}]}},markLine:{silent:true,data:[{yAxis:65,lineStyle:{color:'#f8514950',type:'dashed',width:1},label:{show:false}},{yAxis:40,lineStyle:{color:'#d2992250',type:'dashed',width:1},label:{show:false}}]}},{name:'MA5',type:'line',data:ma5,symbol:'none',lineStyle:{color:'#58a6ff',width:1.5}},{name:'MA10',type:'line',data:ma10,symbol:'none',lineStyle:{color:'#3fb950',width:1.5}},{name:'MA20',type:'line',data:ma20,symbol:'none',lineStyle:{color:'#f85149',width:1.5}}]})})}
function renderDetail(){const d=state.detail||state.index;if(!d)return;const ind=d.indicators||{};const el=document.getElementById('detailContent');el.innerHTML='';const secs=[{k:'valuation',t:'估值维度',n:{valuation_composite:'PE/PB复合',below_net_rate:'破净率(反向)',erp:'股权风险溢价'},d:{valuation_composite:'PE*0.6+PB*0.4历史分位',below_net_rate:'破净率高=便宜=低分',erp:'1/PE-10Y国债(反向)'}},{k:'macro',t:'宏观维度',n:{m1m2_scissors:'M1-M2剪刀差',m2_yoy:'M2同比'},d:{m1m2_scissors:'M1-M2增速差日频',m2_yoy:'货币供应量增速日频'}},{k:'fund',t:'资金维度',n:{northbound_cumflow:'北向资金累计变化',margin_ratio:'融资余额/流通市值'},d:{northbound_cumflow:'北向资金20日累计变化率',margin_ratio:'融资余额占流通市值比'}},{k:'sentiment',t:'情绪维度',n:{turnover:'换手率',up_down_ratio:'涨跌家数比',limit_up_ratio:'涨停占比',limit_ratio:'涨跌停比',qvix:'QVIX恐慌'},d:{turnover:'全市场成交额/流通市值',up_down_ratio:'上涨/下跌家数比',limit_up_ratio:'涨停股票占比',limit_ratio:'涨停数/跌停数',qvix:'50ETF隐含波动率(反向)'}},{k:'technical',t:'技术维度',n:{ma_alignment:'MA排列比',deviation_ma250:'均线偏离度',momentum_60d:'60日动量',momentum_20d:'20日动量',momentum_120d:'120日动量'},d:{ma_alignment:'MA20>MA60>MA120多头排列占比',deviation_ma250:'偏离250日均线幅度',momentum_60d:'60日涨幅历史分位',momentum_20d:'20日涨幅历史分位',momentum_120d:'120日涨幅历史分位'}},{k:'structure',t:'结构维度',n:{new_high_ratio:'创新高占比',ah_premium_index:'AH股溢价指数'},d:{new_high_ratio:'250日新高股票占比',ah_premium_index:'HSAHP月频赋分(反向)'}}];secs.forEach(sec=>{const items=ind[sec.k]||{};let html='<div class="detail-section"><h3>'+sec.t+'</h3><div class="ind-grid">';Object.entries(sec.n).forEach(([kk,label])=>{const v=items[kk];const l=lvl(v);const c=clr(v);html+='<div class="ind-item"><div class="name">'+label+'</div><div class="val" style="color:'+c+'">'+(v!=null?v.toFixed(1):'—')+'</div><div class="desc">'+(sec.d[kk]||'')+'</div></div>'});html+='</div></div>';el.innerHTML+=html})}
function renderSectors(){const data=state.sectors;if(!data||!data.length)return;const hot=data.filter(s=>s.heat_label==='hot').length,warm=data.filter(s=>s.heat_label==='warm').length,cold=data.filter(s=>s.heat_label==='cold').length;document.getElementById('sectorSummary').innerHTML='<div class="summary-card"><div class="num" style="color:#f85149">'+hot+'</div><div class="label">热门板块</div></div><div class="summary-card"><div class="num" style="color:#d29922">'+warm+'</div><div class="label">中性板块</div></div><div class="summary-card"><div class="num" style="color:#3fb950">'+cold+'</div><div class="label">冷门板块</div></div><div class="summary-card"><div class="num">'+data.length+'</div><div class="label">行业总数</div></div>';document.getElementById('sectorCount').textContent=data.length+'个行业';renderTreemap(data);renderSectorBar(data);renderSectorTable(data)}
function renderTreemap(data){if(typeof echarts==='undefined')return;let ch=state.charts.treemap;if(!ch){const el=document.getElementById('treemap');if(!el)return;ch=echarts.init(el);state.charts.treemap=ch}ch.setOption({tooltip:{formatter:p=>p.name+'<br/>热度: <b>'+p.value+'</b>'},series:[{type:'treemap',data:data.slice(0,40).map(s=>({name:s.sector_name,value:Math.max(1,Math.round(s.composite_score)),itemStyle:{color:s.composite_score>=70?'#f85149':s.composite_score>=40?'#d29922':'#3fb950'}})),width:'100%',height:'100%',breadcrumb:{show:false},label:{show:true,fontSize:10,color:'#fff',overflow:'truncate'},itemStyle:{borderColor:'#0d1117',borderWidth:1,gapWidth:1}}]})}
function renderSectorBar(data){if(typeof echarts==='undefined')return;let ch=state.charts.sectorBar;if(!ch){const el=document.getElementById('sectorBar');if(!el)return;ch=echarts.init(el);state.charts.sectorBar=ch}const top=data.slice(0,20).reverse();ch.setOption({tooltip:{trigger:'axis'},grid:{top:10,bottom:5,left:100,right:30},xAxis:{type:'value',max:100,axisLabel:{color:'#6e7681'},splitLine:{lineStyle:{color:'#161b22'}}},yAxis:{type:'category',data:top.map(s=>s.sector_name),axisLabel:{color:'#c9d1d9',fontSize:10}},series:[{type:'bar',data:top.map(s=>({value:s.composite_score,itemStyle:{color:s.composite_score>=70?'#f85149':s.composite_score>=40?'#d29922':'#3fb950',borderRadius:[0,3,3,0]}})),barWidth:12,label:{show:true,position:'right',color:'#c9d1d9',fontSize:9,formatter:p=>p.value>=60?p.value.toFixed(0):''}}]})}
function renderSectorTable(data){const tbody=document.getElementById('sectorTableBody');tbody.innerHTML='';data.forEach(s=>{const pc=s.avg_pct_change!=null?(s.avg_pct_change>=0?'+':'')+s.avg_pct_change.toFixed(2)+'%':'—';const lc=s.leader?'<span style="color:var(--accent);font-size:11px">'+s.leader.code+'</span> '+(s.leader.pct>=0?'+':'')+s.leader.pct.toFixed(2)+'%':'—';tbody.innerHTML+='<tr><td style="color:var(--tx3)">'+s.rank+'</td><td><b>'+s.sector_name+'</b></td><td><span style="color:'+(s.composite_score>=70?'#f85149':s.composite_score>=40?'#d29922':'#3fb950')+';font-weight:700">'+(s.composite_score||0).toFixed(0)+'</span></td><td>'+(s.composite_score||0).toFixed(1)+'</td><td>'+(s.dim_valuation||0).toFixed(1)+'</td><td>'+(s.dim_sentiment||0).toFixed(1)+'</td><td>'+(s.dim_technical||0).toFixed(1)+'</td><td>'+pc+'</td><td>'+(s.up_ratio!=null?s.up_ratio.toFixed(1)+'%':'—')+'</td><td>'+lc+'</td></tr>'})}
function renderHistory(){const tbody=document.getElementById('historyTableBody');tbody.innerHTML='';const h=(state.history||[]).slice(-30).reverse();h.forEach(d=>{const s=d.composite_score;const l=lvl(s);const lc={red:'#f85149',yellow:'#d29922',green:'#3fb950'}[l]||'#6e7681';tbody.innerHTML+='<tr><td style="font-family:var(--mono);font-size:11px">'+d.trade_date+'</td><td style="color:'+lc+';font-weight:700">'+(s!=null?s.toFixed(1):'—')+'</td><td>'+(d.dim_valuation||0).toFixed(1)+'</td><td>'+(d.dim_fund||0).toFixed(1)+'</td><td>'+(d.dim_sentiment||0).toFixed(1)+'</td><td>'+(d.dim_technical||0).toFixed(1)+'</td><td>'+(d.dim_structure||0).toFixed(1)+'</td><td><span style="color:'+lc+'">'+lvlCN(s)+'</span></td></tr>'})}
function showApp(){document.getElementById('loadingScreen').style.display='none';document.getElementById('app').style.display=''}
function showError(msg){document.getElementById('loadingScreen').innerHTML='<div style="color:#f85149">'+msg+'</div>'}
document.addEventListener('DOMContentLoaded',async()=>{try{const r=await loadData();if(!r.ok){showError('数据加载失败。请确认 web/data/ 目录下有 index.json');return}showApp();renderTab('overview');window.addEventListener('resize',()=>{Object.values(state.charts).forEach(c=>{try{c.resize()}catch(e){}})})}catch(e){showError('加载出错: '+e.message)}});
return{refresh,switchTab,_state:state}})();
</script>
