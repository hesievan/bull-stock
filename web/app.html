<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A股牛市热度指数 V2</title>
<script src="echarts.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080b12;--card:#0d1117;--card-hover:#111820;--border:#1b2230;--border-h:#2d3a4f;--tx1:#e6edf3;--tx2:#8b949e;--tx3:#484f58;--accent:#58a6ff;--red:#f85149;--yellow:#d29922;--green:#3fb950;--r:12px;--rs:8px;--sans:'Inter',-apple-system,sans-serif;--mono:'JetBrains Mono',monospace}
body{font-family:var(--sans);background:var(--bg);color:var(--tx1);min-height:100vh;line-height:1.5}
.container{max-width:1280px;margin:0 auto;padding:0 28px}
.header{display:flex;align-items:center;justify-content:space-between;padding:20px 0;border-bottom:1px solid var(--border);margin-bottom:20px}
.header h1{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
.header .tag{font-size:11px;color:var(--accent);background:rgba(88,166,255,.08);padding:3px 10px;border-radius:20px;font-weight:600}
.header-right{display:flex;align-items:center;gap:14px}
.header-time{font-family:var(--mono);font-size:11px;color:var(--tx3)}
.btn-refresh{width:32px;height:32px;border-radius:var(--rs);border:1px solid var(--border);background:var(--card);color:var(--tx2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s}
.btn-refresh:hover{background:var(--card-hover);border-color:var(--border-h)}
.tabs{display:flex;gap:2px;margin-bottom:24px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:4px;flex-wrap:nowrap;overflow-x:auto}
.tab{padding:10px 20px;border-radius:var(--rs);font-size:13px;font-weight:500;color:var(--tx2);cursor:pointer;transition:all .2s;border:none;background:none;white-space:nowrap}
.tab:hover{color:var(--tx1);background:rgba(255,255,255,.04)}
.tab.active{color:var(--tx1);background:rgba(255,255,255,.06);box-shadow:0 1px 3px rgba(0,0,0,.2)}
.score-hero{display:grid;grid-template-columns:auto 1fr;gap:48px;align-items:center;padding:24px 0 32px;border-bottom:1px solid var(--border)}
.gauge-wrap{width:280px;height:260px}
.score-big{font-size:72px;font-weight:900;letter-spacing:-3px;line-height:1;font-family:var(--mono)}
.score-label{font-size:16px;font-weight:600;margin-top:6px}
.score-date{font-size:12px;color:var(--tx3);margin-top:4px;font-family:var(--mono)}
.score-delta{font-size:13px;margin-top:8px;padding:4px 12px;border-radius:20px;display:inline-block;font-weight:500}
.dim-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:24px 0}
.dim-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px 14px;transition:border-color .2s}
.dim-card:hover{border-color:var(--border-h)}
.dim-card .label{font-size:11px;color:var(--tx3);margin-bottom:6px;font-weight:500;letter-spacing:.3px;text-transform:uppercase}
.dim-card .value{font-size:32px;font-weight:800;font-family:var(--mono);line-height:1.1}
.dim-card .bar{height:3px;background:var(--border);border-radius:2px;margin-top:10px;overflow:hidden}
.dim-card .bar-fill{height:100%;border-radius:2px;transition:width .6s ease-out}
.chart-box{margin:20px 0;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.chart-box h3{font-size:12px;font-weight:600;color:var(--tx2);margin-bottom:10px;letter-spacing:.3px;text-transform:uppercase}
.chart-area{height:320px}
.chart-area-lg{height:420px}
.ind-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.ind-item{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:14px}
.ind-item .name{font-size:11px;color:var(--tx3);margin-bottom:4px}
.ind-item .val{font-size:22px;font-weight:700;font-family:var(--mono)}
.ind-item .desc{font-size:10px;color:var(--tx3);margin-top:4px;line-height:1.4}
.ind-chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ind-chart{height:180px;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:8px}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:100px 20px;color:var(--tx2)}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.disclaimer{padding:16px 20px;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);font-size:11px;color:var(--tx3);text-align:center;margin:24px 0}
.bull-bear-legend{display:flex;gap:12px;flex-wrap:wrap;margin:8px 0;font-size:10px;color:var(--tx2)}
.bull-bear-legend span{display:flex;align-items:center;gap:4px}
.bull-bear-legend .dot{width:10px;height:10px;border-radius:2px;display:inline-block}
@media(max-width:1024px){.dim-grid{grid-template-columns:repeat(2,1fr)}.ind-chart-grid{grid-template-columns:1fr}.score-hero{grid-template-columns:1fr;text-align:center}.score-meta{text-align:center}.gauge-wrap{margin:0 auto}}
@media(max-width:768px){.score-big{font-size:56px}.dim-grid{grid-template-columns:repeat(2,1fr)}.container{padding:0 16px}.header{flex-wrap:wrap}}
@media(max-width:480px){.dim-grid{grid-template-columns:1fr 1fr;gap:8px}.dim-card .value{font-size:24px}.score-big{font-size:48px}.gauge-wrap{width:200px;height:200px}}
</style>
</head>
<body>
<div id="loadingScreen" class="loading"><div class="spinner"></div><div style="font-size:13px;color:var(--tx2)">加载数据中...</div></div>
<div id="app" style="display:none"><div class="container">
<div class="header"><div class="header-brand"><h1>牛市热度指数 <span style="font-size:11px;color:var(--tx3);font-weight:400">V2</span></h1><span class="tag">LIVE</span></div><div class="header-right"><span class="header-time" id="lastUpdate"></span><button class="btn-refresh" id="refreshBtn" onclick="App.refresh()" title="刷新">↻</button></div></div>
<div class="tabs"><div class="tab active" onclick="App.switchTab('overview',this)">概览</div><div class="tab" onclick="App.switchTab('detail',this)">指标拆解</div><div class="tab" onclick="App.switchTab('history',this)">历史记录</div></div>
<div id="tab-overview" class="tab-content">
<div class="score-hero"><div class="gauge-wrap"><div id="gaugeChart" style="width:100%;height:100%"></div></div><div class="score-meta"><div id="scoreValue" class="score-big">--</div><div id="scoreLabel" class="score-label">加载中</div><div id="scoreDate" class="score-date"></div><div id="dailyChange" class="score-delta"></div></div></div>
<div id="dimCards" class="dim-grid"></div>
<div class="chart-box"><h3>综合热度走势 (2015-2026)</h3><div class="bull-bear-legend"><span><span class="dot" style="background:rgba(88,166,255,.4)"></span>牛市</span><span><span class="dot" style="background:rgba(248,81,73,.4)"></span>熊市</span><span><span class="dot" style="background:rgba(210,153,34,.4)"></span>震荡</span><span>红区 ≥65 · 黄区 40-64 · 绿区 &lt;40</span></div><div id="historyChart" class="chart-area-lg"></div></div>
<div class="chart-box"><h3>四维雷达</h3><div id="radarChart" class="chart-area"></div></div>
</div>
<div id="tab-detail" class="tab-content" style="display:none"><div id="detailContent"></div></div>
<div id="tab-history" class="tab-content" style="display:none"><div id="historyContent"></div></div>
<div class="disclaimer">本指数仅反映市场历史统计规律，不构成投资建议。历史规律不代表未来表现。</div>
</div></div>
<script>
const App=(()=>{'use strict';let state={index:null,detail:null,history:[],sectors:[],tab:'overview',charts:{}};
function ts(){return'?t='+Date.now()}
function lvl(s){return s==null?'unknown':s>=70?'red':s>=40?'yellow':'green'}
function lvlCN(s){return{red:'红色预警',yellow:'黄色警惕',green:'绿色安全'}[lvl(s)]||'未知'}
function clr(s){return{red:'#f85149',yellow:'#d29922',green:'#3fb950'}[lvl(s)]||'#6e7681'}
const dimNames={valuation:'估值',fund:'资金',sentiment:'情绪',structure:'结构'};
const indMeta={pe:{label:'大盘PE',desc:'全市场PE中位数历史百分位(反向)',dir:'rev',color:'#58a6ff'},erp:{label:'股权风险溢价',desc:'1/PE-10Y国债(反向)',dir:'rev',color:'#79c0ff'},buffett:{label:'巴菲特指标',desc:'A股总市值/GDP(反向)',dir:'rev',color:'#bc8cff'},margin_ratio_v2:{label:'两融余额市值比',desc:'(融资+融券)/流通市值',dir:'pos',color:'#3fb950'},deposit_ratio:{label:'存款市值比',desc:'M2/总市值(反向)',dir:'rev',color:'#d29922'},turnover_m2:{label:'成交额M2比',desc:'日成交额/M2',dir:'pos',color:'#f85149'},turnover:{label:'换手率',desc:'成交额/流通市值×10',dir:'pos',color:'#ff7b72'},new_high:{label:'创新高占比',desc:'250日新高股票占比',dir:'pos',color:'#7ee787'},ma_alignment:{label:'MA排列比',desc:'MA20>MA60>MA120占比',dir:'pos',color:'#a5d6ff'}};
// A股牛熊周期标记
const bbPeriods=[
  {start:'2014-07-01',end:'2015-06-12',label:'杠杆牛',type:'bull',color:'rgba(88,166,255,.12)'},
  {start:'2015-06-15',end:'2015-08-26',label:'股灾1.0',type:'bear',color:'rgba(248,81,73,.12)'},
  {start:'2015-08-27',end:'2015-12-31',label:'反弹',type:'recovery',color:'rgba(210,153,34,.08)'},
  {start:'2016-01-04',end:'2016-02-29',label:'熔断',type:'bear',color:'rgba(248,81,73,.12)'},
  {start:'2016-03-01',end:'2018-01-24',label:'慢牛',type:'bull',color:'rgba(88,166,255,.08)'},
  {start:'2018-01-25',end:'2019-01-03',label:'熊市',type:'bear',color:'rgba(248,81,73,.12)'},
  {start:'2019-01-04',end:'2021-02-10',label:'结构牛',type:'bull',color:'rgba(88,166,255,.08)'},
  {start:'2021-02-18',end:'2022-04-27',label:'调整',type:'bear',color:'rgba(248,81,73,.08)'},
  {start:'2022-04-28',end:'2024-02-05',label:'震荡下行',type:'bear',color:'rgba(248,81,73,.06)'},
  {start:'2024-02-06',end:'2026-06-22',label:'修复',type:'recovery',color:'rgba(88,166,255,.06)'},
];
async function fetchJSON(url){try{const r=await fetch(url+'?t='+Date.now());if(!r.ok)throw 0;return await r.json()}catch(e){return null}}
async function loadData(){const[i,d,h,ih]=await Promise.all([fetchJSON('data/index.json'),fetchJSON('data/detail.json'),fetchJSON('data/history.json'),fetchJSON('data/indicator_history.json')]);state.index=i;state.detail=d;state.history=h||[];state.indicatorHistory=ih||{};return{ok:!!i}}
async function refresh(){document.getElementById('refreshBtn').disabled=true;try{const r=await loadData();if(!r.ok)return;showApp();renderTab(state.tab)}finally{document.getElementById('refreshBtn').disabled=false}}
function switchTab(t,el){state.tab=t;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));if(el)el.classList.add('active');document.querySelectorAll('.tab-content').forEach(x=>x.style.display='none');const e=document.getElementById('tab-'+t);if(e)e.style.display='';renderTab(t);setTimeout(()=>Object.values(state.charts).forEach(c=>{try{c.resize()}catch(e){}}),50)}
function renderTab(t){if(t==='overview')renderOverview();else if(t==='detail')renderDetail();else if(t==='history')renderHistory()}
function renderOverview(){const d=state.index;if(!d)return;const s=d.composite_score,c=clr(s);document.getElementById('scoreValue').textContent=s!=null?s.toFixed(1):'—';document.getElementById('scoreValue').style.color=c;document.getElementById('scoreLabel').textContent=lvlCN(s);document.getElementById('scoreDate').textContent=d.trade_date||'';const h=state.history||[],prev=h.length>=2?h[h.length-2]:null;if(prev&&s!=null){const diff=s-(prev.composite_score||0);const sign=diff>=0?'+':'';const el=document.getElementById('dailyChange');el.textContent='较昨日 '+sign+diff.toFixed(1);el.style.color=diff>=0?'#f85149':'#3fb950';el.style.background=diff>=0?'rgba(248,81,73,.08)':'rgba(63,185,80,.08)'}document.getElementById('lastUpdate').textContent=d.updated_at||'';renderDimCards(d.dimensions||{});renderGauge(s,c);renderHistoryChart();renderRadar()}
function renderDimCards(dims){const el=document.getElementById('dimCards');el.innerHTML='';Object.entries(dims).forEach(([k,v])=>{const sc=v.score,c=clr(sc);el.innerHTML+='<div class="dim-card"><div class="label">'+(dimNames[k]||k)+'</div><div class="value" style="color:'+c+'">'+(sc!=null?sc.toFixed(1):'—')+'</div><div class="bar"><div class="bar-fill" style="width:'+(sc||0)+'%;background:'+c+'"></div></div></div>'})}
function renderGauge(s,c){if(typeof echarts==='undefined')return;let ch=state.charts.gauge;if(!ch){const el=document.getElementById('gaugeChart');if(!el)return;ch=echarts.init(el);state.charts.gauge=ch}ch.setOption({series:[{type:'gauge',startAngle:220,endAngle:-40,min:0,max:100,splitNumber:10,radius:'90%',center:['50%','65%'],axisLine:{lineStyle:{width:16,color:[[0.35,'#1a472a'],[0.7,'#5c4b00'],[1,'#5c1a1a']]}},splitLine:{length:10,lineStyle:{color:'#21262d',width:2}},axisTick:{show:false},axisLabel:{color:'#6e7681',fontSize:9,distance:-30},pointer:{icon:'path://M12.8 0.7l12 40.1H0.7L12.8 0.7z',length:'55%',width:5,offsetCenter:[0,'-8%'],itemStyle:{color:c}},detail:{valueAnimation:true,formatter:s!=null?'{value}':'—',color:c,fontSize:32,fontWeight:700,offsetCenter:[0,'50%']},title:{offsetCenter:[0,'80%'],color:'#6e7681',fontSize:11},data:[{value:s!=null?s:0,name:s!=null?lvlCN(s):'暂无'}]}]})}
function renderHistoryChart(){if(typeof echarts==='undefined')return;let ch=state.charts.history;if(!ch){const el=document.getElementById('historyChart');if(!el)return;ch=echarts.init(el);state.charts.history=ch}const h=state.history||[];const dates=h.map(d=>d.trade_date);const scores=h.map(d=>d.composite_score);const total=dates.length;const maxLabels=Math.floor(total/6);function ma(arr,n){const r=[];for(let i=0;i<arr.length;i++){if(i<n-1||arr[i]===null){r.push(null);continue}let s=0,c=0;for(let j=i-n+1;j<=i;j++){if(arr[j]!==null){s+=arr[j];c++}}r.push(c?Math.round(s/c*10)/10:null)}return r}const ma5=ma(scores,5),ma10=ma(scores,10),ma20=ma(scores,20);const markData=[];bbPeriods.forEach(p=>{const idxS=dates.findIndex(d=>d>=p.start);const idxE=dates.findIndex(d=>d>=p.end);if(idxS>=0&&idxE>=0){markData.push([{xAxis:dates[idxS],itemStyle:{color:p.color}},{xAxis:dates[Math.min(idxE,total-1)]}])}});ch.setOption({tooltip:{trigger:'axis',formatter:p=>{let s=p[0].name;p.forEach(t=>{if(t.value!=null)s+='<br/>'+t.marker+t.seriesName+': <b>'+t.value.toFixed(1)+'</b>'});return s}},grid:{top:24,bottom:30,left:40,right:15},legend:{data:['热度','MA5','MA10','MA20'],top:2,right:10,textStyle:{color:'#8b949e',fontSize:10},itemWidth:12,itemHeight:8},dataZoom:[{type:'inside',start:0,end:100}],xAxis:{type:'category',data:dates,axisLabel:{color:'#6e7681',fontSize:10,interval:maxLabels>0?maxLabels:0,rotate:total>500?30:0},axisLine:{lineStyle:{color:'#21262d'}}},yAxis:{type:'value',min:0,max:100,splitLine:{lineStyle:{color:'#161b22'}},axisLabel:{color:'#6e7681',fontSize:10}},series:[{name:'热度',type:'line',data:scores,smooth:true,symbol:'none',sampling:'lttb',large:true,lineStyle:{color:'#58a6ff',width:2},areaStyle:{color:{type:'linear',x:0,y:0,x2:0,y2:1,colorStops:[{offset:0,color:'rgba(88,166,255,.2)'},{offset:1,color:'rgba(88,166,255,0)'}]}},markArea:{data:markData,silent:true},markLine:{silent:true,data:[{yAxis:65,lineStyle:{color:'#f85149',type:'dashed',width:1},label:{color:'#f85149',fontSize:10,formatter:'红区 65'}},{yAxis:40,lineStyle:{color:'#d29922',type:'dashed',width:1},label:{color:'#d29922',fontSize:10,formatter:'黄区 40'}}]}},{name:'MA5',type:'line',data:ma5,symbol:'none',lineStyle:{color:'#3fb950',width:1.5}},{name:'MA10',type:'line',data:ma10,symbol:'none',lineStyle:{color:'#d29922',width:1.5}},{name:'MA20',type:'line',data:ma20,symbol:'none',lineStyle:{color:'#f85149',width:1.5}}]})}
function renderRadar(){if(typeof echarts==='undefined')return;let ch=state.charts.radar;if(!ch){const el=document.getElementById('radarChart');if(!el)return;ch=echarts.init(el);state.charts.radar=ch}const ds=state.index.dimensions||{};const keys=['valuation','fund','sentiment','structure'];ch.setOption({tooltip:{},radar:{indicator:keys.map(k=>({name:dimNames[k]||k,max:100})),shape:'polygon',splitNumber:4,axisName:{color:'#8b949e',fontSize:11},splitLine:{lineStyle:{color:'#21262d'}},splitArea:{areaStyle:{color:['rgba(22,27,34,.5)','rgba(33,38,45,.5)']}},axisLine:{lineStyle:{color:'#21262d'}}},series:[{type:'radar',data:[{value:keys.map(k=>ds[k]&&ds[k].score!=null?+ds[k].score.toFixed(1):0),name:'热度',areaStyle:{color:'rgba(88,166,255,.15)'},lineStyle:{color:'#58a6ff',width:2},symbol:'circle',symbolSize:5,itemStyle:{color:'#58a6ff'}}]}]})}
function renderDetail(){const d=state.detail||state.index;if(!d)return;const ind=d.indicators_v2||{};const el=document.getElementById('detailContent');const ih=state.indicatorHistory||{};const dates=Object.keys(ih).sort();if(!dates.length){el.innerHTML='<div style="padding:40px;text-align:center;color:var(--tx2)">暂无指标历史数据</div>';return}// Current values cards
let html='<div class="detail-section"><h3>📊 9大核心指标 · 当前值</h3><div class="ind-grid">';Object.entries(indMeta).forEach(([kk,m])=>{const v=ind[kk];const sc=m.dir==='rev'?100-(v||0):(v||0);const ic=sc>=70?'#f85149':sc>=40?'#d29922':'#3fb950';html+='<div class="ind-item"><div class="name" style="color:'+m.color+'">● '+m.label+'</div><div class="val" style="color:'+ic+'">'+(v!=null?v.toFixed(1):'—')+'</div><div class="desc">'+m.desc+'</div></div>'});const qv=ind.qvix||(d.indicators||{}).qvix;if(qv!=null)html+='<div class="ind-item"><div class="name" style="color:#58a6ff">● QVIX</div><div class="val" style="color:#58a6ff">'+qv.toFixed(1)+'</div><div class="desc">50ETF隐含波动率(展示不计分)</div></div>';html+='</div></div>';el.innerHTML=html;// 9 indicator trend charts
const indKeys=['pe','erp','buffett','margin_ratio_v2','deposit_ratio','turnover_m2','turnover','new_high','ma_alignment'];
indKeys.forEach(key=>{const meta=indMeta[key];if(!meta)return;const chartId='ichart_'+key;html+='<div class="chart-box" style="margin:8px 0"><h3 style="color:'+meta.color+'">'+meta.label+' <span style="color:var(--tx3);font-weight:400;text-transform:none">'+meta.desc+'</span></h3><div id="'+chartId+'" class="chart-area" style="height:200px"></div></div>'});el.innerHTML=html;// Render ECharts
setTimeout(()=>{indKeys.forEach(key=>{const meta=indMeta[key];if(!meta)return;const chartId='ichart_'+key;const cEl=document.getElementById(chartId);if(!cEl||typeof echarts==='undefined')return;let ch=state.charts[key];if(!ch){ch=echarts.init(cEl);state.charts[key]=ch}// Extract data for this indicator
let data=[];dates.forEach(td=>{if(ih[td]&&ih[td][key]!==undefined)data.push({date:td,val:ih[td][key]})});if(data.length<5){cEl.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--tx2);font-size:12px">数据不足(仅'+data.length+'条)</div>';return}const chDates=data.map(x=>x.date);const chVals=data.map(x=>x.val);const total=chDates.length;const maxL=Math.floor(total/8);const bbMarkData=[];bbPeriods.forEach(p=>{const iS=chDates.findIndex(d=>d>=p.start);const iE=chDates.findIndex(d=>d>=p.end);if(iS>=0&&iE>=0)bbMarkData.push([{xAxis:chDates[iS],itemStyle:{color:p.color}},{xAxis:chDates[Math.min(iE,total-1)]}])});ch.setOption({tooltip:{trigger:'axis',formatter:p=>{let s=p[0].name;p.forEach(t=>{if(t.value!=null)s+='<br/>'+t.marker+t.seriesName+': <b>'+t.value.toFixed(1)+'</b>'});return s}},grid:{top:20,bottom:20,left:40,right:8},dataZoom:[{type:'inside',start:0,end:100}],xAxis:{type:'category',data:chDates,axisLabel:{color:'#6e7681',fontSize:9,interval:maxL>0?maxL:0},axisLine:{lineStyle:{color:'#21262d'}}},yAxis:{type:'value',min:0,max:100,splitLine:{lineStyle:{color:'#161b22'}},axisLabel:{color:'#6e7681',fontSize:9}},series:[{name:meta.label,type:'line',data:chVals,smooth:true,symbol:'none',sampling:'lttb',lineStyle:{color:meta.color,width:1.5},areaStyle:{color:{type:'linear',x:0,y:0,x2:0,y2:1,colorStops:[{offset:0,color:meta.color+'30'},{offset:1,color:meta.color+'00'}]}},markArea:{data:bbMarkData,silent:true},markLine:{silent:true,data:[{yAxis:65,lineStyle:{color:'#f8514940',type:'dashed',width:1},label:{show:false}},{yAxis:40,lineStyle:{color:'#d2992240',type:'dashed',width:1},label:{show:false}}]}}]})})},100)}
function renderHistory(){const el=document.getElementById('historyContent');if(!el)return;const h=(state.history||[]).slice(-30).reverse();if(!h.length){el.innerHTML='<div style="padding:40px;text-align:center;color:var(--tx2)">暂无历史数据</div>';return}let html='<div class="table-wrap"><div class="table-head"><h3>近期记录</h3></div><div class="table-scroll" style="max-height:600px"><table><thead><tr><th>日期</th><th>综合</th><th>估值</th><th>资金</th><th>情绪</th><th>结构</th><th>状态</th></tr></thead><tbody>';h.forEach(d=>{const s=d.composite_score;const l=lvl(s);const lc={red:'#f85149',yellow:'#d29922',green:'#3fb950'}[l]||'#6e7681';const dims=d.dimensions||{};const v=d.indicators_v2?true:false;html+='<tr><td style="font-family:var(--mono);font-size:11px">'+d.trade_date+'</td><td style="color:'+lc+';font-weight:700">'+(s!=null?s.toFixed(1):'—')+'</td><td>'+(dims.valuation?dims.valuation.score!=null?dims.valuation.score.toFixed(1):'—':'—')+'</td><td>'+(dims.fund?dims.fund.score!=null?dims.fund.score.toFixed(1):'—':'—')+'</td><td>'+(dims.sentiment?dims.sentiment.score!=null?dims.sentiment.score.toFixed(1):'—':'—')+'</td><td>'+(dims.structure?dims.structure.score!=null?dims.structure.score.toFixed(1):'—':'—')+'</td><td><span style="color:'+lc+'">'+lvlCN(s)+(v?' V2':'')+'</span></td></tr>'});html+='</tbody></table></div></div>';el.innerHTML=html}
function showApp(){document.getElementById('loadingScreen').style.display='none';document.getElementById('app').style.display=''}
document.addEventListener('DOMContentLoaded',async()=>{try{const r=await loadData();if(!r.ok){document.getElementById('loadingScreen').innerHTML='<div style="color:#f85149">数据加载失败</div>';return}showApp();renderTab('overview');window.addEventListener('resize',()=>{Object.values(state.charts).forEach(c=>{try{c.resize()}catch(e){}})})}catch(e){document.getElementById('loadingScreen').innerHTML='<div style="color:#f85149">加载出错: '+e.message+'</div>'}});
return{refresh,switchTab,_state:state}})();
</script>
