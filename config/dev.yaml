# A股牛市热度指数 — 开发环境配置

# 热度等级阈值（综合热度 0-100）— 与 V2 引擎 / json_writer / 前端同步
heat_levels:
  red:    { min: 65, max: 100, label: "红色预警", color: "#f85149" }
  orange: { min: 55, max: 64,  label: "橙色关注", color: "#e5892a" }
  yellow: { min: 40, max: 54,  label: "黄色警惕", color: "#d29922" }
  green:  { min: 0,  max: 39,  label: "绿色安全", color: "#3fb950" }

# 维度权重
dimension_weights:
  valuation:  0.25
  macro:      0.15
  capital:    0.15
  sentiment:  0.20
  technical:  0.10
  structure:  0.15

# 数据参数
data:
  lookback_years: 10
  min_history_days: 250
  db_path: "data/heat_index_dev.db"
  request_delay: 1.0
  max_retries: 3

# 飞书通知 — 开发环境不推送
notification:
  feishu_webhook: ""
  notify_on: ["extreme", "hot"]
  notify_on_recovery: true

# 输出
output:
  html_path: "web/index.html"
  json_path: "web/data/latest.json"
