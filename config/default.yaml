# A股牛市热度指数 — 默认配置

# 热度等级阈值（综合热度 0-100）
heat_levels:
  green:  { min: 0,  max: 40,  label: "绿色安全", emoji: "🟢" }
  yellow: { min: 40, max: 55,  label: "黄色警惕", emoji: "🟡" }
  orange: { min: 55, max: 65,  label: "橙色关注", emoji: "🟠" }
  red:    { min: 65, max: 100, label: "红色预警", emoji: "🔴" }

# 维度权重
dimension_weights:
  valuation:  0.25   # 估值
  macro:      0.15   # 宏观
  fund:       0.15   # 资金
  sentiment:  0.20   # 情绪
  technical:  0.10   # 技术
  structure:  0.15   # 结构

# 估值指标权重
valuation_weights:
  pe_weight:  0.6    # PE分位权重
  pb_weight:  0.4    # PB分位权重

# 背离惩罚参数
divergence_penalty:
  turnover_threshold: 70    # 换手率阈值
  updown_threshold: 30      # 涨跌家数比阈值
  penalty_factor: 0.5       # 惩罚系数
  penalty_floor: 30         # 惩罚下限

# 防抖参数
debounce:
  red_days: 2               # 红区连续天数
  recover_days: 1           # 恢复连续天数

# 指数代码
indices:
  all_market:   "sh000001"    # 上证综指
  chinext:      "sz399006"    # 创业板指
  hs300:        "sh000300"    # 沪深300
  zz500:        "sh000905"    # 中证500
  zz1000:       "sh000852"    # 中证1000

# 数据参数
data:
  lookback_years: 10
  min_history_days: 250
  db_path: "data/heat_index.db"
  request_delay: 0.15
  max_retries: 2

# 飞书通知
notification:
  feishu_webhook: ""
  # 推送条件 (满足任意一个即推送)
  notify_rules:
    - condition: "score >= 65"              # 红区
    - condition: "score >= 55 AND change > 5"  # 橙区且单日涨5分以上
    - condition: "score <= 40 AND change < -5"  # 绿区且单日跌5分以上(抄底信号)
    - condition: "level_change: green->red"  # 绿直接跳红(极端)
    - condition: "level_change: red->green"  # 红恢复到绿(解套)
  # 防抖参数
  debounce:
    red_days: 2               # 红区连续天数
    recover_days: 1           # 恢复连续天数
  # 静默时段 (不推送)
  quiet_hours:
    enabled: false
    start: "22:00"
    end: "08:00"

# 输出
output:
  json_path: "web/data/"
  report_path: "reports/"
